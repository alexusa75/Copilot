kind: AdaptiveDialog
modelDescription: Trigger when the user explicitly  ask to provide a Feedback.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: AdaptiveCardPrompt
      id: AMVDFv
      card: |-
        {
          "$schema": "https://adaptivecards.io/schemas/adaptive-card.json",
          "type": "AdaptiveCard",
          "version": "1.5",
          "body": [
            {
              "type": "TextBlock",
              "text": "We'd love your feedback!",
              "weight": "Bolder",
              "size": "Large",
              "wrap": true
            },
            {
              "type": "TextBlock",
              "text": "How would you rate your experience?",
              "wrap": true,
              "spacing": "Medium"
            },
            {
              "type": "Input.ChoiceSet",
              "id": "rating",
              "style": "expanded",
              "choices": [
                {
                  "title": "😞 Very Dissatisfied",
                  "value": "1"
                },
                {
                  "title": "😐 Dissatisfied",
                  "value": "2"
                },
                {
                  "title": "😐 Neutral",
                  "value": "3"
                },
                {
                  "title": "😊 Satisfied",
                  "value": "4"
                },
                {
                  "title": "😊 Very Satisfied",
                  "value": "5"
                }
              ],
              "placeholder": "Select your rating"
            },
            {
              "type": "Input.ChoiceSet",
              "id": "feedbackCategory",
              "label": "Select a feedback category",
              "isRequired": true,
              "errorMessage": "Please select a feedback category.",
              "choices": [
                {
                  "title": "User Experience",
                  "value": "ux"
                },
                {
                  "title": "Performance",
                  "value": "performance"
                },
                {
                  "title": "Features",
                  "value": "features"
                },
                {
                  "title": "Other",
                  "value": "other"
                }
              ],
              "spacing": "Medium"
            },
            {
              "type": "TextBlock",
              "text": "Tell us more about your experience:",
              "wrap": true,
              "spacing": "Medium"
            },
            {
              "type": "Input.Text",
              "id": "comments",
              "placeholder": "Enter your comments here...",
              "isMultiline": true,
              "maxLength": 500
            }
          ],
          "actions": [
            {
              "type": "Action.Submit",
              "title": "Submit",
              "style": "positive",
              "data": {
                "action": "submit"
              }
            },
            {
              "type": "Action.Submit",
              "title": "Cancel",
              "style": "destructive",
              "data": {
                "action": "cancel"
              }
            }
          ]
        }
      output:
        binding:
          action: Topic.action
          actionSubmitId: Topic.actionSubmitId
          comments: Topic.comments
          feedbackCategory: Topic.feedbackCategory
          rating: Topic.rating

      outputType:
        properties:
          action: String
          actionSubmitId: String
          comments: String
          feedbackCategory: String
          rating: String

    - kind: SendActivity
      id: sendActivity_hZVOY0
      activity:
        attachments:
          - kind: AdaptiveCardTemplate
            cardContent: |-
              {
                "$schema": "https://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.5",
                "body": [
                  {
                    "type": "Container",
                    "items": [
                      {
                        "type": "Image",
                        "url": "data:image/png;base64,",
                        "size": "Medium",
                        "horizontalAlignment": "Center",
                        "style": "Person"
                      },
                      {
                        "type": "TextBlock",
                        "text": "Thank You!",
                        "weight": "Bolder",
                        "size": "ExtraLarge",
                        "horizontalAlignment": "Center",
                        "spacing": "Medium"
                      },
                      {
                        "type": "TextBlock",
                        "text": "Your feedback has been successfully submitted.",
                        "wrap": true,
                        "size": "Medium",
                        "horizontalAlignment": "Center",
                        "color": "Default"
                      },
                      {
                        "type": "TextBlock",
                        "text": "We appreciate your time and insights — they help us improve!",
                        "wrap": true,
                        "size": "Small",
                        "horizontalAlignment": "Center",
                        "isSubtle": true
                      }
                    ],
                    "style": "emphasis",
                    "bleed": true,
                    "spacing": "Large"
                  }
                ]
              }

    - kind: CancelAllDialogs
      id: bmZlYg

inputType: {}
outputType: {}